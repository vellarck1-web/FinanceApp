<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Administração</title>

  <link rel="stylesheet" href="/static/css/admin.css">
  <link rel="icon" type="image/png" href="{{ url_for('static', filename='img/favicon.png') }}">
</head>

<body>

  <aside class="admin-sidebar">
    <h2>Admin</h2>

    <button class="menu-item active">👤 Usuários</button>
    <button class="menu-item disabled">⚙️ Configurações</button>
    <button class="menu-item disabled">📊 Relatórios</button>
    <button class="menu-item" onclick="window.location.href='/home'">⬅ Voltar</button>
  </aside>

  <main class="admin-main">

    <header class="admin-header">
      <h1>Painel Administrativo</h1>
      <p>Gerencie usuários, permissões e configurações do sistema.</p>
    </header>

    <section class="admin-card">

      <div class="section-header">
        <div>
          <h2>Gestão de Usuários</h2>
          <p>Pesquisar, editar, inativar ou excluir usuários.</p>
        </div>

        <button class="btn-primary" onclick="abrirModalNovoUsuario()">
          ➕ Novo usuário
        </button>
      </div>

      <div class="toolbar">
        <input
          type="text"
          id="iptPesquisaUsuario"
          placeholder="Pesquisar por nome, e-mail ou perfil...">

        <button onclick="buscarUsuario()" class="btn-secondary">
          Buscar
        </button>

        <button onclick="limparBusca()" class="btn-clear">
          Limpar
        </button>
      </div>

      <div class="table-wrapper">
        <table>
          <thead>
            <tr>
              <th>Nome</th>
              <th>E-mail</th>
              <th>Perfil</th>
              <th>Status</th>
              <th>Ações</th>
            </tr>
          </thead>

          <tbody id="tabelaUsuarios"></tbody>
        </table>
      </div>

    </section>

  </main>

  <!-- MODAL EDITAR USUÁRIO -->
  <div class="modal" id="modalEditarUsuario">
    <div class="modal-content">

      <button type="button" class="btn-fechar-modal" onclick="fecharModalEditar()">
        ✕
      </button>

      <h2>✏️ Editar Usuário</h2>

      <input type="hidden" id="editUserId">

      <label for="editNome">Nome</label>
      <input type="text" id="editNome">

      <label for="editEmail">E-mail</label>
      <input type="email" id="editEmail">

      <label for="editPerfil">Perfil</label>
      <select id="editPerfil">
        <option value="Padrão">Padrão</option>
        <option value="Administrativo">Administrativo</option>
      </select>

      <label for="editSenha">Nova senha</label>

      <div class="senha-admin-wrapper">
        <input
          type="password"
          id="editSenha"
          placeholder="Deixe vazio para não alterar">

        <button
          type="button"
          class="btn-eye-admin"
          onclick="toggleSenhaAdmin('editSenha', this)">
          👁️
        </button>
      </div>

      <div class="modal-actions">
        <button class="btn-clear" onclick="fecharModalEditar()">Cancelar</button>
        <button class="btn-primary" onclick="salvarUsuario()">Salvar</button>
      </div>

    </div>
  </div>

  <!-- MODAL NOVO USUÁRIO -->
  <div id="modalNovoUsuario" class="modal">

    <div class="modal-admin">

      <button type="button" class="btn-fechar-modal" onclick="fecharModalNovoUsuario()">
        ✕
      </button>

      <h2>👤 Novo Usuário</h2>

      <label for="novoNome">Nome</label>
      <input id="novoNome" placeholder="Nome">

      <label for="novoEmail">E-mail</label>
      <input id="novoEmail" type="email" placeholder="Email">

      <label for="novoPerfil">Perfil</label>
      <select id="novoPerfil">
        <option value="Padrão">Padrão</option>
        <option value="Administrativo">Administrativo</option>
      </select>

      <label for="novoSenha">Senha</label>

      <div class="senha-admin-wrapper">
        <input id="novoSenha" type="password" placeholder="Senha">

        <button
          type="button"
          class="btn-eye-admin"
          onclick="toggleSenhaAdmin('novoSenha', this)">
          👁️
        </button>
      </div>

      <label for="novoConfirmarSenha">Confirmar senha</label>

      <div class="senha-admin-wrapper">
        <input id="novoConfirmarSenha" type="password" placeholder="Confirmar senha">

        <button
          type="button"
          class="btn-eye-admin"
          onclick="toggleSenhaAdmin('novoConfirmarSenha', this)">
          👁️
        </button>
      </div>

      <span id="erroNovoUsuario" class="erro-msg"></span>

      <div class="modal-acoes">
        <button type="button" class="btn-success" onclick="salvarNovoUsuario()">
          💾 Salvar
        </button>

        <button type="button" class="btn-secondary" onclick="fecharModalNovoUsuario()">
          Cancelar
        </button>
      </div>

    </div>

  </div>

  <script src="/static/js/admin.js"></script>
</body>
</html>
