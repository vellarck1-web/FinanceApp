<!DOCTYPE html>
<html lang="pt-br">
<head>

<meta charset="UTF-8">
<title>Dashboard Financeiro</title>

<link rel="stylesheet"
href="{{ url_for('static', filename='css/financas.css') }}">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<script defer
src="{{ url_for('static', filename='js/menu.js') }}">
</script>

<script defer
src="{{ url_for('static', filename='js/financas.js') }}">
</script>
<link rel="icon" type="image/png"href="{{ url_for('static', filename='img/favicon.png') }}">

</head>

<body>

<div id="menu-container"></div>

<div class="container">

    <h1>📊 Dashboard Financeiro</h1>
 
    <div class="top-bar">

        <select id="filtroMes"></select>

        <button id="btnFiltrar">
            Filtrar
        </button>

    </div>

    <div class="cards">

        <div class="card green" id="CardEntrada">
            <h3>Entradas</h3>
            <p id="totalEntradas">R$ 0,00</p>
        </div>

        <div class="card red" id="CardSaida">
            <h3>Saídas</h3>
            <p id="totalSaidas">R$ 0,00</p>
        </div>

        <div class="card blue" id="CardSaldo">
            <h3>Saldo</h3>
            <p id="saldo">R$ 0,00</p>
        </div>

    </div>

    <div class="chart-box">
        <canvas id="grafico"></canvas>
    </div>

</div>

<!-- MODAL CADASTRO USUÁRIO -->
<div
    id="modalCadUser"
    style="
    display:none;
    position:fixed;
    inset:0;
    background:rgba(0,0,0,0.6);
    justify-content:center;
    align-items:center;
    z-index:9999;
">

    <div
        style="
        background:#1e1e1e;
        padding:20px;
        border-radius:10px;
        width:300px;
        color:white;
        display:flex;
        flex-direction:column;
        gap:10px;
    ">

        <h3>Cadastrar Usuário</h3>

        <input
            id="nome"
            placeholder="Nome">

        <input
            id="email"
            placeholder="Email">

        <input
            id="senha"
            type="password"
            placeholder="Senha">

        <input
            id="confirmarSenha"
            type="password"
            placeholder="Confirmar Senha">

        <button
            type="button"
            onclick="togglePassword()">
            👁️
        </button>

        <span
            id="erroSenha"
            style="
            display:none;
            color:red;
        ">
            Senhas diferentes
        </span>

        <span
            id="cadastroSucesso"
            style="
            display:none;
            color:green;
        ">
            Usuário cadastrado com sucesso
        </span>

        <button
            type="button"
            onclick="cadastrarUsuario()">
            Cadastrar
        </button>

        <button
            type="button"
            onclick="fecharModalCadUser()">
            Cancelar
        </button>

    </div>

</div>

</body>
</html>
