<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard Financeiro</title>

<link rel="stylesheet" href="{{ url_for('static', filename='css/home.css') }}">

<script defer src="{{ url_for('static', filename='js/menu.js') }}"></script>
<script defer src="{{ url_for('static', filename='js/home.js') }}"></script>

<link rel="icon" type="image/png"
href="{{ url_for('static', filename='img/favicon.png') }}">

</head>
<body>

<div id="menu-container"></div>

<div class="container">

  <h1>💰 Dashboard Financeiro</h1>

  <!-- CARDS -->
  <div class="cards">
    <div class="card" id="CardEntrada" onclick="filtrarEntradas()">
      <h3>Entradas</h3>
      <span id="totalEntradas">R$ 0,00</span>
    </div>

    <div class="card" id="CardSaida" onclick="filtrarSaidas()">
      <h3>Saídas</h3>
      <span id="totalSaidas">R$ 0,00</span>
    </div>

    <div class="card" id="CardSaldo" onclick="mostrarTodos()">
      <h3>Saldo</h3>
      <span id="saldo">R$ 0,00</span>
    </div>
 
  </div>


<div class="toolbar" id="toolbar">
    <button
        id="btnAdicionar"
        type="button"
        onclick="abrirModalNovoRegistro()">
        ➕ Novo
    </button>

    <div class="filtros">
        <select id="filtroMes"></select>

        <button id="btnFiltrar" onclick="filtrarPorMes()">
           🔍
        </button>

    </div>
</div>
<div  class="top-bar" id="top-bar" style="display:flex;justify-content:right;margin-bottom:20px;">
          <input
            type="text"
            id="iptPesquisa"
            placeholder="🔍 Buscar por Data, Descrição,Valor ou Observação">
        <button id="btnBuscar" onclick="pesquisar()">
            🔍
        </button>
</div>

  <!-- TABELA -->
   <div class="tabela-container">

    <table>
      <thead>
        <tr>
          <th onclick="ordenarTabela('data')" class="sortable">
            Data
            <span id="icon-data" class="sort-icon">⇅</span>
        </th>
          <th>Tipo</th>
          <th onclick="ordenarTabela('descricao')" class="sortable">
            Descrição
            <span id="icon-descricao" class="sort-icon">⇅</span>
          </th>
          <th onclick="ordenarTabela('valor')" class="sortable">
            Valor
            <span id="icon-valor" class="sort-icon">⇅</span>
          </th>
          <th onclick="ordenarTabela('obs')" class="sortable">
            Observação
            <span id="icon-obs" class="sort-icon">⇅</span>
          </th>
          <th>Ações</th>
        </tr>
      </thead>

      <tbody id="tabela"></tbody>
    </table>

</div>


  <!-- PAGINAÇÃO -->
  <div class="paginacao">
    <button id="prevBtn">⬅ Anterior</button>
    <span id="pageInfo"></span>
    <button id="nextBtn">Próximo ➡</button>
  </div>

</div>

<!-- ===================================== -->
<!-- MODAL NOVO REGISTRO -->
<!-- ===================================== -->

<div id="modalNovoRegistro" class="modal">

    <div class="modal-registro">

        <button
            type="button"
            class="btn-fechar-modal"
            onclick="fecharModalNovoRegistro()">
            ✕
        </button>

        <h2>💰 Novo Lançamento</h2>

        <span
            id="msgNovoRegistro"
            class="sucesso-msg">
            Registro salvo com sucesso!
        </span>

        <label for="novoData">Data</label>
        <input
            type="date"
            id="novoData">

        <label for="novoTipo">Tipo</label>

        <select id="novoTipo">
            <option value="Entrada">Entrada</option>
            <option value="Saída">Saída</option>
        </select>

        <label for="novoDescricao">Descrição</label>

        <input
            type="text"
            id="novoDescricao"
            placeholder="Digite a descrição">

        <label for="novoValor">Valor</label>

        <input
            type="number"
            id="novoValor"
            placeholder="Digite o valor">

        <label for="novoObs">Observação</label>

        <input
            type="text"
            id="novoObs"
            placeholder="Observação (Opcional)">

        <span
            id="erroCamposNull"
            class="erro-msg">

            Preencha os campos obrigatórios.

        </span>

        <div class="modal-acoes">

            <button
                id="btnSalvarNovoRegistro"
                onclick="salvarNovoRegistro()">

                💾 Salvar

            </button>

            <button
                id="btnRegistrarOutro"
                onclick="registrarOutro()">

                ➕ Salvar e Novo

            </button>

            <button
                id="btnCancelarNovoRegistro"
                onclick="fecharModalNovoRegistro()">

                Cancelar

            </button>

        </div>

    </div>

</div>

<!-- ===================================== -->
<!-- MODAL EDIT -->
<!-- ===================================== -->

<div id="modalEdit" class="modal">

  <div class="modal-edit">

    <button
      type="button"
      class="btn-fechar-modal"
      onclick="fecharModalEdit()">
      ✕
    </button>

    <h2>✏️ Editar lançamento</h2>

    <label for="editData">Data</label>
    <input id="editData" type="date">

    <label for="editTipo">Tipo</label>
    <select id="editTipo">
      <option value="Entrada">Entrada</option>
      <option value="Saída">Saída</option>
    </select>

    <label for="editDescricao">Descrição</label>
    <input id="editDescricao" placeholder="Digite a descrição">

    <label for="editValor">Valor</label>
    <input id="editValor" type="number" placeholder="Digite o valor">

    <label for="editObs">Observação</label>
    <input id="editObs" placeholder="Digite uma observação">

    <div class="modal-acoes">

      <button
        id="btnSalvarEdicao"
        type="button"
        onclick="salvarEdicao()">
        💾 Salvar
      </button>

      <button
        id="btnCancelarEdicao"
        type="button"
        onclick="fecharModalEdit()">
        Cancelar
      </button>

    </div>

  </div>

</div>



</body>
</html>
