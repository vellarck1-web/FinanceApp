<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard Financeiro</title>

<link rel="stylesheet" href="{{ url_for('static', filename='css/home.css') }}">

<script defer src="{{ url_for('static', filename='js/menu.js') }}"></script>
<script defer src="{{ url_for('static', filename='js/home.js') }}"></script>

<link rel="icon" type="image/png"
href="{{ url_for('static', filename='img/favicon.png') }}">

</head>
<body>

<div id="menu-container"></div>

<div class="container">

  <h1>💰 Dashboard Financeiro</h1>

  <!-- CARDS -->
  <div class="cards">
    <div class="card" id="CardEntrada">
      <h3>Entradas</h3>
      <span id="totalEntradas">R$ 0,00</span>
    </div>

    <div class="card" id="CardSaida">
      <h3>Saídas</h3>
      <span id="totalSaidas">R$ 0,00</span>
    </div>

    <div class="card" id="CardSaldo">
      <h3>Saldo</h3>
      <span id="saldo">R$ 0,00</span>
    </div>
  </div>

  <!-- BOTÃO ADICIONAR -->
  <div style="display:flex;justify-content:center;margin-bottom:20px;">
    <button
      id="btnAdicionar"
      type="button"
      onclick="abrirModalNovoRegistro()">
      ➕ Adicionar
    </button>
  </div>

  <!-- TABELA -->
   <div class="tabela-container">

    <table>
      <thead>
        <tr>
          <th>Data</th>
          <th>Tipo</th>
          <th>Descrição</th>
          <th>Valor</th>
          <th>Observação</th>
          <th>Ações</th>
        </tr>
      </thead>

      <tbody id="tabela"></tbody>
    </table>

</div>


  <!-- PAGINAÇÃO -->
  <div class="paginacao">
    <button id="prevBtn">⬅ Anterior</button>
    <span id="pageInfo"></span>
    <button id="nextBtn">Próximo ➡</button>
  </div>

</div>

<!-- ===================================== -->
<!-- MODAL NOVO REGISTRO -->
<!-- ===================================== -->

<div
  id="modalNovoRegistro"
  style="
    display:none;
    position:fixed;
    inset:0;
    background:rgba(0,0,0,.7);
    justify-content:center;
    align-items:center;
    z-index:9999;
  ">

  <div
    style="
      background:#1e1e1e;
      width:400px;
      max-width:90%;
      padding:24px;
      border-radius:12px;
      color:white;
      display:flex;
      flex-direction:column;
      gap:14px;
      position:relative;
    ">
 
    <!-- FECHAR -->
    <button
      type="button"
      onclick="fecharModalNovoRegistro()"
      style="
        position:absolute;
        right:10px;
        top:10px;
        background:none;
        border:none;
        color:#ff4f7a;
        font-size:28px;
        cursor:pointer;
        width:auto;
        padding:0;
      ">
      ✕
    </button>

    <h2 style="text-align:center;margin:0;">
      Novo Registro
    </h2>

    <span
      id="msgNovoRegistro"
      style="
        display:none;
        color:#2ecc71;
        text-align:center;
        font-weight:bold;
      ">
      Registro salvo com sucesso!
    </span>

    <input
      type="date"
      id="novoData" placeholder="Data" style="color:#888;">

    <select id="novoTipo">
      <option value="Entrada">Entrada</option>
      <option value="Saída">Saída</option>
    </select>

    <input
      type="text"
      id="novoDescricao"
      placeholder="Descrição">

    <input
      type="number"
      id="novoValor"
      placeholder="Valor">

    <input
      type="text"
      id="novoObs"
      placeholder="Observação">

    <button
      type="button" id="btnSalvarNovoRegistro"
      onclick="salvarNovoRegistro()">
      💾 Salvar
    </button>

    <button
      type="button" id="btnRegistrarOutro"
      onclick="registrarOutro()">
      ➕ Registrar outro
    </button>

    <button
      type="button" id="btnCancelarNovoRegistro"
      onclick="fecharModalNovoRegistro()">
      🚫 Cancelar
    </button>

  </div>

</div>

<!-- ===================================== -->
<!-- MODAL EDIT -->
<!-- ===================================== -->

<div
  id="modalEdit"
  style="
    display:none;
    position:fixed;
    inset:0;
    background:rgba(0,0,0,0.7);
    justify-content:center;
    align-items:center;
    z-index:9999;
  ">

  <div
    style="
      background:#1e1e1e;
      padding:24px;
      border-radius:12px;
      width:300px;
      color:white;
      display:flex;
      flex-direction:column;
      gap:14px;
      position:relative;
    ">

    <!-- FECHAR -->
    <button
      type="button"
      onclick="fecharModalEdit()"
      style="
        position:absolute;
        right:10px;
        top:10px;
        background:none;
        border:none;
        color:#ff4f7a;
        font-size:28px;
        cursor:pointer;
        width:auto;
        padding:0;
      ">
      ✕
    </button>

    <h3>Editar lançamento</h3>

    <input id="editData" type="date" placeholder="Data">

    <select id="editTipo">
      <option value="Entrada">Entrada</option>
      <option value="Saída">Saída</option>
    </select>

    <input id="editDescricao">
    <input id="editValor" type="number">
    <input id="editObs">

    <button id="btnSalvarEdicao"
      type="button"
      onclick="salvarEdicao()">
      💾 Salvar
    </button>

    <button id="btnCancelarEdicao"
      type="button"
      onclick="fecharModal()">
      🚫 Cancelar
    </button>

  </div>
</div>

<!-- ===================================== -->
<!-- MODAL CAD USER -->
<!-- ===================================== -->

<div
  id="modalCadUser"
  style="
    display:none;
    position:fixed;
    inset:0;
    background:rgba(0,0,0,0.7);
    justify-content:center;
    align-items:center;
    z-index:9999;
  ">

  <div
    style="
      background:#1e1e1e;
      width:400px;
      max-width:90%;
      padding:24px;
      border-radius:12px;
      color:white;
      display:flex;
      flex-direction:column;
      gap:14px;
      position:relative;

    ">

<!-- FECHAR -->
    <button
      type="button"
      onclick="fecharModalCadUser()"
      style="
        position:absolute;
        right:10px;
        top:10px;
        background:none;
        border:none;
        color:#ff4f7a;
        font-size:28px;
        cursor:pointer;
        width:auto;
        padding:0;
      ">
      ✕
    </button>

    <h3>Cadastrar Usuário</h3>

    <input id="nome" placeholder="Nome">

    <input id="email" placeholder="Email">

    <input
      id="senha"
      type="password"
      placeholder="Senha">

    <input
      id="confirmarSenha"
      type="password"
      placeholder="Confirmar Senha">

    <button
      type="button" id="btnEye"
      onclick="togglePassword()">
      👁️
    </button>

    <span
      id="erroSenha"
      style="
        display:none;
        color:red;
      ">
      Senhas diferentes
    </span>

    <span
      id="cadastroSucesso"
      style="
        display:none;
        color:green;
      ">
      Sucesso
    </span>

    <span id="mensagemErro"></span>
    
    <button
      type="button" id="btnCadastrarUser"
      onclick="cadastrarUsuario()">
      Cadastrar
    </button>

    <button
      type="button" id="btnCancelarCadastro"
      onclick="fecharModalCadUser()">
      Cancelar
    </button>

  </div>
</div>

</body>
</html>
