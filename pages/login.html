<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login</title>
  <!-- Importando o CSS externo -->
  <link rel="stylesheet" href="{{ url_for('static', filename='css/login.css') }}">
  <link rel="icon" type="image/png"href="{{ url_for('static', filename='img/favicon.png') }}"></head>

<body>

  <div class="login-container">
    <h2>Login</h2>

    <form id="loginForm">
      <div class="input-group">
        <input type="email" id="email" placeholder="✉️ E-mail Adress" required>

      </div>

      <div class="senha-wrapper">
          
          <input
              type="password"
              id="password"
              placeholder="🔒 Password"
              required>

          <button
              type="button"
              id="btnEye"
              onclick="togglePassword()">
              👁️
          </button>
      </div>

      <span id="error-message" style="color: red; display: none;">Usuario ou Senha incorretos</span>
      <br><button type="submit">Entrar</button>
    </form>

    <div class="footer">
      Esqueceu sua senha?
    </div>
    
  </div>
<script src="{{ url_for('static', filename='js/login.js') }}"></script>
</body>
</html>
